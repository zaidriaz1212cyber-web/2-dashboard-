<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center;">
        <div class="card" style="padding: 48px;">
            <div style="margin-bottom: 24px; color: var(--accent-green);">
                <i data-lucide="log-out" style="width: 64px; height: 64px;"></i>
            </div>
            <h2 style="margin-bottom: 16px;">You have been logged out</h2>
            <p style="color: var(--secondary-text); margin-bottom: 32px;">Thank you for using the Premium Analytics Dashboard.</p>
            <a href="index.html" class="btn-primary" style="text-decoration: none;">Login Again</a>
        </div>
    </div>
    <script>lucide.createIcons();</script>

</html>
